<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>PSO — Régie</title>
  <link rel="stylesheet" href="/regie.css" />
</head>
<body>

  <!-- Header -->
  <div class="regie-header">
    <h1>PSO Régie</h1>
    <span class="conn-dot" id="conn-dot"></span>
    <a href="/control" target="_blank">Panneau complet →</a>
    <a href="/deck" target="_blank">Stream Deck →</a>
  </div>

  <!-- 3 columns -->
  <div class="regie-cols">

    <!-- Col 1 : Start.gg -->
    <div class="regie-col">
      <div class="col-title">Start.gg</div>
      <div class="col-body">

        <div class="sgg-config">
          <div class="field">
            <label>Clé API</label>
            <input type="password" id="sgg-apikey" placeholder="Clé start.gg…" autocomplete="off" />
            <span class="sgg-key-status" id="sgg-key-status"></span>
          </div>
          <div class="field">
            <label>Slug ou URL du tournoi</label>
            <input type="text" id="sgg-slug" placeholder="tournament/mon-tournoi" />
          </div>
          <div class="btn-row">
            <button class="btn btn-primary btn-full" id="sgg-search-btn">Chercher</button>
          </div>
        </div>

        <div id="sgg-tournament-section" style="display:none">
          <div class="sgg-tournament-name" id="sgg-tournament-name"></div>
          <div class="sgg-event-row">
            <select id="sgg-event-select"></select>
            <button class="btn btn-outline" id="sgg-load-event-btn">Charger</button>
          </div>
        </div>

        <div class="sgg-sep"></div>

        <div id="sgg-sets-section">
          <div class="hint" id="sgg-sets-hint">Aucun tournoi chargé.</div>
          <div class="sets-list" id="sgg-sets-list"></div>
        </div>

      </div>
    </div>

    <!-- Col 2 : Scoreboard -->
    <div class="regie-col">
      <div class="col-title">Scoreboard</div>
      <div class="col-body">

        <!-- Joueur 1 -->
        <div class="sb-section">
          <div class="sb-label">Joueur 1</div>
          <div class="player-row">
            <div class="field">
              <label>Tag / Équipe</label>
              <input type="text" id="p1-tag" placeholder="TAG" />
            </div>
            <div class="field">
              <label>Nom</label>
              <input type="text" id="p1-name" placeholder="Player 1" />
            </div>
          </div>
          <div class="score-row">
            <button class="score-btn minus" id="p1-dec">−</button>
            <span class="score-num" id="p1-score">0</span>
            <button class="score-btn" id="p1-inc">+</button>
            <span style="flex:1"></span>
            <button class="char-none-btn" id="p1-char-clear">✕ Perso</button>
          </div>
          <div class="char-grid" id="p1-char-grid"></div>
        </div>

        <div class="divider"></div>

        <!-- Joueur 2 -->
        <div class="sb-section">
          <div class="sb-label">Joueur 2</div>
          <div class="player-row">
            <div class="field">
              <label>Tag / Équipe</label>
              <input type="text" id="p2-tag" placeholder="TAG" />
            </div>
            <div class="field">
              <label>Nom</label>
              <input type="text" id="p2-name" placeholder="Player 2" />
            </div>
          </div>
          <div class="score-row">
            <button class="score-btn minus" id="p2-dec">−</button>
            <span class="score-num" id="p2-score">0</span>
            <button class="score-btn" id="p2-inc">+</button>
            <span style="flex:1"></span>
            <button class="char-none-btn" id="p2-char-clear">✕ Perso</button>
          </div>
          <div class="char-grid" id="p2-char-grid"></div>
        </div>

        <div class="divider"></div>

        <!-- Event / Phase -->
        <div class="sb-section">
          <div class="player-row">
            <div class="field">
              <label>Événement</label>
              <input type="text" id="sb-event" placeholder="Tournament" />
            </div>
            <div class="field">
              <label>Phase / Stage</label>
              <input type="text" id="sb-stage" placeholder="Grand Final" />
            </div>
          </div>
        </div>

        <!-- Actions -->
        <div class="sb-actions">
          <div class="btn-row">
            <button class="btn btn-primary btn-full" id="btn-apply">✓ Appliquer</button>
          </div>
          <div class="btn-row">
            <button class="btn btn-outline" id="btn-swap" style="flex:1">⇄ Swap J1/J2</button>
            <button class="btn btn-danger" id="btn-reset-score" style="flex:1">↺ Reset scores</button>
          </div>
        </div>

      </div>
    </div>

    <!-- Col 3 : Scènes -->
    <div class="regie-col">
      <div class="col-title">Scènes Studio</div>
      <div class="col-body">

        <div class="scene-grid" id="scene-grid">
          <div class="loading">Chargement…</div>
        </div>

        <div class="sgg-sep"></div>

        <div class="sb-label" style="margin-bottom:8px">Thème Overlays</div>
        <div class="theme-grid" id="theme-grid"></div>

      </div>
    </div>

  </div>

  <!-- Status bar -->
  <div class="status-bar" id="status-bar">Prêt.</div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/regie.js"></script>
</body>
</html>
