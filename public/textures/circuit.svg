<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80">
  <!--
    Circuit board traces — 80×80 tileable tile.
    Orthogonal paths with 90° bends and solder-joint dots.
    Stroke color intentionally near-invisible; theme CSS sets opacity.
  -->
  <g fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.8" stroke-linecap="round" stroke-linejoin="round">
    <!-- Trace 1: horizontal bus -->
    <polyline points="0,16 24,16 24,8 56,8 56,16 80,16"/>
    <!-- Trace 2: vertical left column -->
    <polyline points="16,0 16,24 8,24 8,56 16,56 16,80"/>
    <!-- Trace 3: diagonal-free right path -->
    <polyline points="48,0 48,32 64,32 64,48 80,48"/>
    <!-- Trace 4: bottom horizontal -->
    <polyline points="0,64 32,64 32,48 40,48 40,80"/>
    <!-- Trace 5: center cross -->
    <polyline points="40,0 40,24 56,24 56,40 80,40"/>
    <polyline points="0,40 24,40 24,56 40,56 40,80"/>
  </g>
  <!-- Solder joints (vias) -->
  <g fill="rgba(255,255,255,0.09)">
    <circle cx="24" cy="16" r="2"/>
    <circle cx="56" cy="16" r="2"/>
    <circle cx="16" cy="24" r="2"/>
    <circle cx="8"  cy="40" r="1.5"/>
    <circle cx="16" cy="56" r="2"/>
    <circle cx="48" cy="32" r="2"/>
    <circle cx="64" cy="32" r="1.5"/>
    <circle cx="64" cy="48" r="2"/>
    <circle cx="32" cy="64" r="2"/>
    <circle cx="32" cy="48" r="1.5"/>
    <circle cx="40" cy="24" r="2"/>
    <circle cx="56" cy="24" r="1.5"/>
    <circle cx="56" cy="40" r="2"/>
    <circle cx="24" cy="40" r="1.5"/>
    <circle cx="24" cy="56" r="2"/>
    <circle cx="40" cy="56" r="1.5"/>
  </g>
</svg>
