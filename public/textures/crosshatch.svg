<svg xmlns="http://www.w3.org/2000/svg" width="10" height="10">
  <!-- Cross-hatch: +45° and -45° diagonals -->
  <!-- +45° -->
  <line x1="-1" y1="1"  x2="1"  y2="-1" stroke="rgba(255,255,255,0.055)" stroke-width="0.6"/>
  <line x1="0"  y1="10" x2="10" y2="0"  stroke="rgba(255,255,255,0.055)" stroke-width="0.6"/>
  <line x1="9"  y1="11" x2="11" y2="9"  stroke="rgba(255,255,255,0.055)" stroke-width="0.6"/>
  <!-- -45° -->
  <line x1="0"  y1="0"  x2="10" y2="10" stroke="rgba(255,255,255,0.055)" stroke-width="0.6"/>
  <line x1="-1" y1="9"  x2="1"  y2="11" stroke="rgba(255,255,255,0.055)" stroke-width="0.6"/>
  <line x1="9"  y1="-1" x2="11" y2="1"  stroke="rgba(255,255,255,0.055)" stroke-width="0.6"/>
</svg>
