<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100">
  <!--
    Starfield — 100×100 tileable.
    Mix of sizes for depth; opacity variation creates parallax feel.
  -->
  <!-- Large stars -->
  <circle cx="12"  cy="8"   r="1.1" fill="rgba(255,255,255,0.55)"/>
  <circle cx="74"  cy="23"  r="1.3" fill="rgba(255,255,255,0.50)"/>
  <circle cx="38"  cy="61"  r="1.0" fill="rgba(255,255,255,0.48)"/>
  <circle cx="89"  cy="77"  r="1.2" fill="rgba(255,255,255,0.52)"/>
  <circle cx="54"  cy="90"  r="0.9" fill="rgba(255,255,255,0.45)"/>
  <!-- Medium stars -->
  <circle cx="6"   cy="45"  r="0.7" fill="rgba(255,255,255,0.35)"/>
  <circle cx="29"  cy="18"  r="0.6" fill="rgba(255,255,255,0.32)"/>
  <circle cx="48"  cy="38"  r="0.7" fill="rgba(255,255,255,0.38)"/>
  <circle cx="62"  cy="55"  r="0.6" fill="rgba(255,255,255,0.30)"/>
  <circle cx="83"  cy="44"  r="0.8" fill="rgba(255,255,255,0.40)"/>
  <circle cx="17"  cy="72"  r="0.6" fill="rgba(255,255,255,0.33)"/>
  <circle cx="93"  cy="12"  r="0.7" fill="rgba(255,255,255,0.36)"/>
  <circle cx="70"  cy="84"  r="0.6" fill="rgba(255,255,255,0.28)"/>
  <!-- Small/faint stars -->
  <circle cx="3"   cy="88"  r="0.4" fill="rgba(255,255,255,0.20)"/>
  <circle cx="22"  cy="51"  r="0.4" fill="rgba(255,255,255,0.18)"/>
  <circle cx="40"  cy="7"   r="0.4" fill="rgba(255,255,255,0.22)"/>
  <circle cx="58"  cy="30"  r="0.4" fill="rgba(255,255,255,0.17)"/>
  <circle cx="77"  cy="65"  r="0.4" fill="rgba(255,255,255,0.21)"/>
  <circle cx="95"  cy="92"  r="0.3" fill="rgba(255,255,255,0.16)"/>
  <circle cx="35"  cy="80"  r="0.3" fill="rgba(255,255,255,0.19)"/>
  <circle cx="67"  cy="14"  r="0.3" fill="rgba(255,255,255,0.15)"/>
  <circle cx="15"  cy="34"  r="0.3" fill="rgba(255,255,255,0.18)"/>
  <circle cx="85"  cy="58"  r="0.4" fill="rgba(255,255,255,0.20)"/>
  <!-- Twinkling highlight (4-point cross) on brightest star -->
  <line x1="74" y1="21"  x2="74" y2="25"  stroke="rgba(255,255,255,0.30)" stroke-width="0.4"/>
  <line x1="72" y1="23"  x2="76" y2="23"  stroke="rgba(255,255,255,0.30)" stroke-width="0.4"/>
</svg>
