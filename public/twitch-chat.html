<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Twitch Chat Overlay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Russo+One&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="twitch-chat.css" />
  <link rel="stylesheet" href="/pso-transition.css" />
</head>
<body>
  <div class="chat-overlay hidden pso-surface" id="chat-overlay">
    <canvas id="chat-particle-canvas"></canvas>
    <div class="chat-header">
      <svg class="chat-twitch-logo" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714z"/>
      </svg>
      <span class="chat-channel-name" id="chat-channel-name">—</span>
      <span class="chat-live-dot" id="chat-live-dot" title="Connecté"></span>
    </div>
    <div class="chat-messages" id="chat-messages"></div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/texture.js"></script>
  <script src="particle-engine.js"></script>
  <script src="twitch-chat.js"></script>
  <script>window.PSO_T = { id: 'twitch-chat', root: '#chat-overlay' };</script>
  <script src="/pso-transition.js"></script>
</body>
</html>
