<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PSO – Twitch Layout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="twitch-layout.css" />
</head>
<body>

<div id="twitch-layout" class="twitch-layout pso-surface">

  <!-- ── Coins décoratifs ────────────────────────────────────── -->
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <!-- ── Lueur ambiante de fond ─────────────────────────────── -->
  <div class="ambient-glow glow-left"></div>
  <div class="ambient-glow glow-right"></div>

  <!-- ── Barre de scan (effet theme) ───────────────────────── -->
  <div class="scan-line"></div>

  <!-- ── Panneau bas : joueur 1 / info / joueur 2 ──────────── -->
  <div class="bottom-bar">

    <!-- Joueur 1 -->
    <div class="player-panel player-left" id="panel-p1">
      <div class="panel-accent-line"></div>
      <div class="panel-content">
        <div class="player-tag" id="tag-p1">TAG1</div>
        <div class="player-name" id="name-p1">Joueur 1</div>
        <div class="player-character" id="char-p1"></div>
      </div>
      <div class="score-badge" id="score-p1">0</div>
    </div>

    <!-- Centre : event + round + VS -->
    <div class="center-panel" id="center-panel">
      <div class="event-label" id="event-label">PSO</div>
      <div class="vs-wrapper">
        <div class="vs-score" id="vs-score-p1">0</div>
        <div class="vs-text">VS</div>
        <div class="vs-score" id="vs-score-p2">0</div>
      </div>
      <div class="round-label" id="round-label">Pools</div>
    </div>

    <!-- Joueur 2 -->
    <div class="player-panel player-right" id="panel-p2">
      <div class="score-badge" id="score-p2">0</div>
      <div class="panel-content">
        <div class="player-tag" id="tag-p2">TAG2</div>
        <div class="player-name" id="name-p2">Joueur 2</div>
        <div class="player-character" id="char-p2"></div>
      </div>
      <div class="panel-accent-line"></div>
    </div>

  </div>

  <!-- ── Lignes latérales décoratives ──────────────────────── -->
  <div class="side-line side-left"></div>
  <div class="side-line side-right"></div>

  <!-- ── Compteur de viewers ────────────────────────────────── -->
  <div class="viewer-widget" id="viewer-widget">
    <div class="viewer-dot" id="viewer-dot"></div>
    <svg class="viewer-icon" viewBox="0 0 24 24" fill="currentColor">
      <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
    </svg>
    <span class="viewer-count" id="viewer-count">–</span>
    <span class="viewer-label">viewers</span>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
  <script src="/texture.js"></script>
<script src="twitch-layout.js"></script>
</body>
</html>
