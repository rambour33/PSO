<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>PSO – Scoreboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="overlay.css" />
</head>
<body>
  <div id="scoreboard" class="scoreboard pso-surface">

    <!-- Logo défilant (thèmes custom) -->
    <div class="theme-logo-bg" id="theme-logo-bg"></div>

    <!-- Particules canvas -->
    <canvas id="particle-canvas"></canvas>

    <!-- Barre événement (partagée) -->
    <div class="event-bar">
      <span id="event-name">TOURNAMENT</span>
      <span class="sep">·</span>
      <span id="event-stage">Grand Final</span>
      <span class="sep">·</span>
      <span id="format-info">Bo3</span>
      <span class="sep" id="current-stage-sep" style="display:none">·</span>
      <span id="current-stage-name"></span>
    </div>

    <!-- Layout complet -->
    <div class="full-layout">
      <div class="players-container">
        <div class="player player-left" id="player1-block">
          <div class="player-character" id="p1-character">
            <div class="char-placeholder" id="p1-char-placeholder">?</div>
            <img id="p1-char-img" src="" alt="" style="display:none" />
          </div>
          <div class="player-info">
            <div class="player-name" id="p1-name">PLAYER 1</div>
          </div>
          <img id="p1-flag-img" class="player-flag player-flag-left" src="" alt="" style="display:none" />
        </div>
        <div class="score-center">
          <div class="score-box">
            <div class="dots-col-left" id="p1-dots-col"></div>
            <span class="score" id="p1-score">0</span>
            <div class="center-logo-area">
              <span class="score-vs" id="score-vs">VS</span>
              <img id="center-logo-img" src="" alt="" style="display:none" />
            </div>
            <span class="score" id="p2-score">0</span>
            <div class="dots-col-right" id="p2-dots-col"></div>
          </div>
          <div class="series-dots">
            <div class="dots-left" id="p1-dots"></div>
            <div class="dots-right" id="p2-dots"></div>
          </div>
        </div>
        <div class="player player-right" id="player2-block">
          <div class="player-info">
            <div class="player-name" id="p2-name">PLAYER 2</div>
          </div>
          <div class="player-character" id="p2-character">
            <div class="char-placeholder" id="p2-char-placeholder">?</div>
            <img id="p2-char-img" src="" alt="" style="display:none" />
          </div>
          <img id="p2-flag-img" class="player-flag player-flag-right" src="" alt="" style="display:none" />
        </div>
      </div>
    </div>

    <!-- Layout slim -->
    <div class="slim-layout">
      <div class="slim-bar">
        <div class="slim-player slim-left" id="player1-block-slim">
          <img class="slim-stock-icon" id="p1-stock-icon" src="" alt="" style="display:none" />
          <div class="slim-icon-sep" id="p1-icon-sep" style="display:none"></div>
          <span class="slim-name" id="p1-name-slim">PLAYER 1</span>
        </div>
        <div class="slim-scores">
          <span class="slim-score" id="p1-score-slim">0</span>
          <div class="slim-center-logo">
            <span class="slim-vs" id="slim-vs">VS</span>
            <img id="center-logo-img-slim" src="" alt="" style="display:none" />
          </div>
          <span class="slim-score" id="p2-score-slim">0</span>
        </div>
        <div class="slim-player slim-right" id="player2-block-slim">
          <span class="slim-name" id="p2-name-slim">PLAYER 2</span>
          <div class="slim-icon-sep" id="p2-icon-sep" style="display:none"></div>
          <img class="slim-stock-icon" id="p2-stock-icon" src="" alt="" style="display:none" />
        </div>
      </div>
    </div>

  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/texture.js"></script>
  <script src="particle-engine.js"></script>
  <script src="overlay.js"></script>
</body>
</html>
