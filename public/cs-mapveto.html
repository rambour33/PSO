<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <title>PSO – CS2 Map Veto</title>
  <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Inter:wght@400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="cs-mapveto.css"/>
  <link rel="stylesheet" href="/pso-transition.css"/>
</head>
<body>
  <div id="cs-mv" class="cs-mv pso-surface">

    <!-- Équipe 1 -->
    <div class="cs-mv-team cs-mv-team-1">
      <img class="cs-mv-logo" id="cmv-t1-logo" src="" alt=""/>
      <div class="cs-mv-team-name" id="cmv-t1-name">TEAM ALPHA</div>
      <div class="cs-mv-slots" id="cmv-t1-slots"></div>
    </div>

    <!-- Centre (maps) -->
    <div class="cs-mv-center">
      <div class="cs-mv-header">
        <div class="cs-mv-event" id="cmv-event">IEM KATOWICE</div>
        <div class="cs-mv-phase" id="cmv-phase">MAP VETO</div>
      </div>
      <div class="cs-mv-maps" id="cmv-maps"></div>
    </div>

    <!-- Équipe 2 -->
    <div class="cs-mv-team cs-mv-team-2">
      <img class="cs-mv-logo" id="cmv-t2-logo" src="" alt=""/>
      <div class="cs-mv-team-name" id="cmv-t2-name">TEAM BRAVO</div>
      <div class="cs-mv-slots" id="cmv-t2-slots"></div>
    </div>

  </div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="cs-mapveto.js"></script>
  <script src="/pso-transition.js"></script>
  <script>window.PSO_T = { id: 'cs-mapveto', root: '#cs-mv' };</script>
</body>
</html>
