<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PSO – Connexion</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0A0A0F;
      font-family: 'Inter', 'Segoe UI', sans-serif;
      color: #F0EEF8;
    }
    .card {
      width: 360px;
      background: #13131A;
      border: 1px solid #2A2A3A;
      border-radius: 12px;
      padding: 40px 36px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    }
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-text {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 4px;
      color: #E8B830;
      text-transform: uppercase;
    }
    .logo-sub {
      font-size: 11px;
      color: #5A5A7A;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 4px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #8888AA;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      background: #0E0E16;
      border: 1px solid #2A2A3A;
      border-radius: 8px;
      color: #F0EEF8;
      font-size: 15px;
      outline: none;
      transition: border-color .2s;
    }
    input[type="password"]:focus { border-color: #E8B830; }
    button {
      width: 100%;
      margin-top: 20px;
      padding: 13px;
      background: #E8B830;
      border: none;
      border-radius: 8px;
      color: #0A0A0F;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background .2s, transform .1s;
    }
    button:hover  { background: #f5c940; }
    button:active { transform: scale(.98); }
    .error {
      margin-top: 14px;
      padding: 10px 14px;
      background: rgba(232,48,48,.15);
      border: 1px solid rgba(232,48,48,.4);
      border-radius: 6px;
      color: #E85050;
      font-size: 13px;
      display: none;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-text">PSO</div>
      <div class="logo-sub">Panneau de contrôle</div>
    </div>
    <label for="pwd">Mot de passe</label>
    <input type="password" id="pwd" autocomplete="current-password" autofocus />
    <button id="btn">Connexion</button>
    <div class="error" id="err">Mot de passe incorrect.</div>
  </div>
  <script>
    const btn = document.getElementById('btn');
    const pwd = document.getElementById('pwd');
    const err = document.getElementById('err');

    async function login() {
      err.style.display = 'none';
      btn.disabled = true;
      btn.textContent = '...';
      try {
        const r = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pwd.value }),
        });
        if (r.ok) {
          window.location.href = '/control';
        } else {
          err.style.display = 'block';
          pwd.value = '';
          pwd.focus();
        }
      } catch {
        err.textContent = 'Erreur réseau.';
        err.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Connexion';
      }
    }

    btn.addEventListener('click', login);
    pwd.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
  </script>
</body>
</html>
